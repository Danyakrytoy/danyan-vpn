<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>DanyanVPN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spring{0%{transform:scale(1)}40%{transform:scale(.88)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.25)}50%{box-shadow:0 0 0 20px rgba(52,199,89,0)}}

:root{--bg:#000;--text:#fff;--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.2);--accent:#0a84ff;--accent2:#5e5ce6;--green:#34c759;--orange:#ff9f0a;--red:#ff453a;--radius:16px;--pill:22px}
body{font-family:-apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow:hidden;background:radial-gradient(ellipse at 50% 30%,#0d1b2a 0%,#000 70%)}
.safe{height:100dvh;display:flex;flex-direction:column;padding:0 16px;overflow:hidden}
.head{text-align:center;padding-top:54px;animation:fade .5s ease}
.head h1{font-size:36px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.head p{font-size:13px;color:var(--text2);margin-top:2px}

/* Power button — centered, big, glass */
.power-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fade .6s ease .1s both;gap:16px}
.power{width:100px;height:100px;border-radius:50px;border:none;outline:none;-webkit-appearance:none;
background:rgba(255,255,255,.06);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
border:1.5px solid rgba(255,255,255,.12);cursor:pointer;font-size:36px;
transition:all .35s cubic-bezier(.34,1.56,.64,1);position:relative;
box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.power:active{transform:scale(.85)}
.power.on{background:rgba(52,199,89,.12);border-color:rgba(52,199,89,.3)}
.power.loading{background:rgba(255,159,10,.1);border-color:rgba(255,159,10,.2);pointer-events:none}
.power-label{font-size:15px;font-weight:500;color:var(--text2);transition:.3s}
.power-label.on{color:var(--green)}
.power-label.loading{color:var(--orange);animation:pulse 1s}
.power-status{font-size:14px;font-family:'SF Mono',monospace;color:var(--accent);font-weight:500;min-height:20px}

/* Country scroll */
.country-section{flex-shrink:0;margin-bottom:16px;animation:fade .5s ease .2s both}
.country-section label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-left:4px;margin-bottom:6px;display:block}
.country-scroll{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 2px;scrollbar-width:none}
.country-scroll::-webkit-scrollbar{display:none}
.country-pill{-webkit-appearance:none;appearance:none;border:none;outline:none;flex-shrink:0;
padding:10px 18px;border-radius:30px;font-size:14px;font-family:inherit;font-weight:500;
background:rgba(255,255,255,.06);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
border:1px solid rgba(255,255,255,.08);color:var(--text2);cursor:pointer;
transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap
}
.country-pill:active{transform:scale(.9)}
.country-pill.selected{background:rgba(10,132,255,.12);border-color:rgba(10,132,255,.25);color:var(--accent)}

/* Quota bar */
.quota-card{flex-shrink:0;background:rgba(255,255,255,.04);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:var(--radius);border:1px solid rgba(255,255,255,.06);padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;animation:fade .5s ease .25s both}
.quota-ring{width:36px;height:36px;border-radius:50%;position:relative;flex-shrink:0}
.quota-ring svg{transform:rotate(-90deg)}
.quota-ring .bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:3}
.quota-ring .fg{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s}
.quota-right{flex:1}
.quota-gb{font-size:17px;font-weight:700;letter-spacing:-.3px}
.quota-label{font-size:11px;color:var(--text2);margin-top:1px}

/* Tab bar */
.tabs{position:fixed;bottom:0;left:0;right:0;padding:8px 16px 32px;display:flex;gap:0;justify-content:center;animation:fade .5s ease .3s both}
.tab{-webkit-appearance:none;appearance:none;border:none;outline:none;font-family:inherit;
flex:1;max-width:110px;padding:8px 12px;border-radius:12px;font-size:11px;font-weight:500;
background:rgba(255,255,255,.04);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
border:1px solid rgba(255,255,255,.06);color:var(--text3);cursor:pointer;
display:flex;flex-direction:column;align-items:center;gap:3px;transition:.25s;
}
.tab.active{background:rgba(10,132,255,.1);border-color:rgba(10,132,255(.2);color:var(--accent)}
.tab .icon{font-size:18px}
.tab:active{transform:scale(.93)}

/* Toast */
.toast-wrap{position:fixed;top:0;left:0;right:0;z-index:100;pointer-events:none;padding:54px 16px 0;text-align:center}
.toast{display:inline-block;padding:10px 20px;border-radius:14px;font-size:13px;font-weight:500;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
opacity:0;transform:translateY(-12px) scale(.95);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{opacity:1;transform:translateY(0) scale(1)}
.toast.ok{background:rgba(52,199,89,.15);border:1px solid rgba(52,199,89(.2);color:var(--green)}
.toast.err{background:rgba(255,69,58,.15);border:1px solid rgba(255,69,58,.2);color:var(--red)}

/* Subs tab */
.subs-screen{display:flex;flex-direction:column;gap:10px;padding-top:54px;animation:fade .4s ease}
.subs-screen h2{font-size:28px;font-weight:700;margin-bottom:4px}
.subs-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:16px}
.subs-card.highlight{background:rgba(10,132,255,.06);border-color:rgba(10,132,255(.15)}
.subs-price{font-size:28px;font-weight:700}
.subs-price span{font-size:14px;font-weight:400;color:var(--text2)}
.subs-desc{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5}
.subs-btn{-webkit-appearance:none;border:none;font-family:inherit;width:100%;padding:14px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:10px}
.subs-btn:active{transform:scale(.97)}
.subs-btn.buy{background:var(--accent);color:#fff}
.subs-btn.gb{background:rgba(255,159,10,.1);color:var(--orange);border:1px solid rgba(255,159,10(.15)}
</style>
</head>
<body>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<div class="safe" id="mainScreen">
<div class="head"><h1>DanyanVPN</h1><p>Нажми, чтобы включить</p></div>

<div class="power-wrap">
<div><button class="power" id="power" onclick="toggle()">⚡</button></div>
<div class="power-label" id="powerLabel">Нажми, чтобы включить</div>
<div class="power-status" id="powerStatus"></div>
</div>

<div class="country-section">
<label>Страна</label>
<div class="country-scroll" id="countryScroll"></div>
</div>

<div class="quota-card" id="quotaCard">
<div class="quota-ring"><svg width="36" height="36"><circle class="bg" cx="18" cy="18" r="16"/><circle class="fg" id="quotaArc" cx="18" cy="18" r="16" stroke-dasharray="100.53" stroke-dashoffset="0"/></svg></div>
<div class="quota-right"><div class="quota-gb" id="quotaGb">1.00 GB</div><div class="quota-label" id="quotaLabel">Бесплатно · осталось</div></div>
</div>

<div class="tabs">
<button class="tab active" onclick="showTab('main')"><span class="icon">🛡</span>VPN</button>
<button class="tab" onclick="showTab('subs')"><span class="icon">💎</span>Тарифы</button>
<button class="tab" onclick="showTab('aff')"><span class="icon">👥</span>Партнёры</button>
</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const API=params.get('api')||window.location.origin;
const COUNTRIES=['🌍 Auto','🇺🇸 USA','🇯🇵 Japan','🇩🇪 Germany','🇳🇱 Netherlands','🇸🇬 Singapore','🇬🇧 UK','🇦🇺 Australia','🇧🇷 Brazil'];
let sel='auto',cfg='',on=false,tgId='';

function af(path,opts){const h=opts?.headers||{};h['bypass-tunnel-reminder']='1';return fetch(API+path,{...opts,headers:h})}

function toast(m,t){const e=document.querySelector('.toast');e.textContent=m;e.className='toast '+t+' show';clearTimeout(e._h);e._h=setTimeout(()=>e.className='toast',2600)}

function renderCountries(){
const el=document.getElementById('countryScroll');el.innerHTML='';
const keys=['auto','us','jp','de','nl','sg','gb','au','br'];
keys.forEach((k,i)=>{
const b=document.createElement('button');b.className='country-pill'+(k===sel?' selected':'');
b.textContent=COUNTRIES[i];b.onclick=()=>{if(!on){sel=k;renderCountries()}};el.appendChild(b)});
}

function setPower(active,loading){
const p=document.getElementById('power');
p.className='power'+(active?' on':'')+(loading?' loading':'');
p.textContent=active?'🔒':loading?'':'⚡';
const l=document.getElementById('powerLabel');
l.textContent=active?'Защищено':loading?'Подключаюсь...':'Нажми, чтобы включить';
l.className='power-label'+(active?' on':'')+(loading?' loading':'');
}

function updateQuota(gb,hasSub){
const pct=Math.min(100,Math.round(gb/1*100));
const circ=document.getElementById('quotaArc');
const dash=100.53-(100.53*pct/100);
circ.setAttribute('stroke-dashoffset',dash);
circ.setAttribute('stroke',hasSub?'#34c759':pct>20?'#0a84ff':'#ff9f0a');
document.getElementById('quotaGb').textContent=hasSub?'∞':gb.toFixed(2)+' GB';
document.getElementById('quotaLabel').textContent=hasSub?'Премиум · безлимитно':'Бесплатно · осталось';
}

async function toggle(){
if(on){
on=false;setPower(false);cfg='';document.getElementById('powerStatus').textContent='';toast('Отключено','ok');return
}
setPower(false,true);
try{
const body={region:sel};if(tgId)body.telegram_id=tgId;
const r=await af('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
const d=await r.json();
if(!d.success)throw new Error(d.error);
cfg=d.config;on=true;setPower(true);
document.getElementById('powerStatus').textContent='🌐 '+COUNTRIES[['auto','us','jp','de','nl','sg','gb','au','br'].indexOf(sel)];
if(d.remaining_gb!==undefined)updateQuota(d.remaining_gb,false);
toast('VPN включён','ok');
// One-tap open WireGuard (behind the scenes)
const b64=btoa(cfg);window.location.href=API+'/wg?config='+encodeURIComponent(b64);
}catch(e){setPower(false);toast(e.message||'Ошибка','err')}
}

function showTab(t){
document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
event.target.closest('.tab').classList.add('active');
const safe=document.getElementById('mainScreen');
if(t==='main'){
safe.innerHTML=`<div class="head"><h1>DanyanVPN</h1><p>Нажми, чтобы включить</p></div>
<div class="power-wrap"><div><button class="power" id="power" onclick="toggle()">⚡</button></div>
<div class="power-label" id="powerLabel">Нажми, чтобы включить</div><div class="power-status" id="powerStatus"></div></div>
<div class="country-section"><label>Страна</label><div class="country-scroll" id="countryScroll"></div></div>
<div class="quota-card" id="quotaCard"><div class="quota-ring"><svg width="36" height="36"><circle class="bg" cx="18" cy="18" r="16"/><circle class="fg" id="quotaArc" cx="18" cy="18" r="16" stroke-dasharray="100.53" stroke-dashoffset="0"/></svg></div>
<div class="quota-right"><div class="quota-gb" id="quotaGb">1.00 GB</div><div class="quota-label" id="quotaLabel">Бесплатно · осталось</div></div></div>
<div class="tabs"><button class="tab active" onclick="showTab('main')"><span class="icon">🛡</span>VPN</button>
<button class="tab" onclick="showTab('subs')"><span class="icon">💎</span>Тарифы</button>
<button class="tab" onclick="showTab('aff')"><span class="icon">👥</span>Партнёры</button></div>`;
renderCountries();}else if(t==='subs'){
safe.innerHTML=`<div class="subs-screen">
<div><h2>💎 Тарифы</h2><p style="font-size:13px;color:var(--text2);margin-bottom:16px">Выбери подходящий план</p></div>
<div class="subs-card"><div class="subs-price">1 GB</div><div class="subs-desc">🌍 Все страны · ⚡ Max скорость<br>🔒 WireGuard · 📱 iOS, Android, PC</div></div>
<div class="subs-card highlight"><div class="subs-price">$4.99 <span>/мес</span></div><div class="subs-desc">🚀 Безлимитный трафик · 🌍 Все страны<br>⚡ Приоритетная скорость · 🔒 WireGuard</div>
<button class="subs-btn buy" onclick="if(tgId){fetch(API+'/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tgId,action:'subscribe'})}).then(r=>r.json()).then(d=>{if(d.success)toast('Подписка оформлена!','ok')})}else{toast('Открой через бота','err')}">💳 Купить подписку</button></div>
<div class="subs-card"><div class="subs-price" style="color:var(--orange)">$0.99</div><div class="subs-desc">📦 +1 GB трафика<br>💎 Суммируется · без срока</div>
<button class="subs-btn gb" onclick="if(tgId){fetch(API+'/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tgId,action:'buy_gb'})}).then(r=>r.json()).then(d=>{if(d.success)toast('+1 GB добавлено!','ok')})}else{toast('Открой через бота','err')}">📦 Купить 1 GB</button></div>
<div style="flex:1"></div>
<div class="tabs"><button class="tab" onclick="showTab('main')"><span class="icon">🛡</span>VPN</button>
<button class="tab active" onclick="showTab('subs')"><span class="icon">💎</span>Тарифы</button>
<button class="tab" onclick="showTab('aff')"><span class="icon">👥</span>Партнёры</button></div></div>`;
}else if(t==='aff'){
safe.innerHTML=`<div class="subs-screen">
<div><h2>👥 Партнёры</h2><p style="font-size:13px;color:var(--text2);margin-bottom:16px">Приглашай друзей и получай 30%</p></div>
<div class="subs-card" style="text-align:center">
<div style="font-size:36px;margin-bottom:8px">🏆</div>
<div style="font-size:13px;color:var(--text2);line-height:1.6">
<b style="color:var(--text)">30%</b> от каждой покупки друга<br>
Выплаты на баланс · Вывод в боте<br>
Твоя ссылка появится в боте после /start
</div></div>
<div style="flex:1"></div>
<div class="tabs"><button class="tab" onclick="showTab('main')"><span class="icon">🛡</span>VPN</button>
<button class="tab" onclick="showTab('subs')"><span class="icon">💎</span>Тарифы</button>
<button class="tab active" onclick="showTab('aff')"><span class="icon">👥</span>Партнёры</button></div></div>`;
}}

try{if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.initDataUnsafe&&Telegram.WebApp.initDataUnsafe.user)tgId=Telegram.WebApp.initDataUnsafe.user.id}catch(e){}

renderCountries();
</script>
</body>
</html>
