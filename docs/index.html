<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,viewport-fit=cover">
<title>DanyanVPN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--text:#fff;--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.15);--accent:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--rad:14px}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;background:radial-gradient(ellipse at 50% 20%,#0a1a2e 0%,#000 60%)}
.safe{height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding:0 20px}
.top{display:flex;justify-content:space-between;align-items:center;padding-top:54px;padding-bottom:4px}
.top h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.04);color:var(--t2)}
.badge.on{background:rgba(48,209,88,.1);color:var(--green)}
.badge.busy{background:rgba(255,159,10,.1);color:var(--orange)}
.mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.btn{width:92px;height:92px;border-radius:50%;border:none;outline:none;-webkit-appearance:none;cursor:pointer;position:relative;
background:rgba(255,255,255,.04);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
border:1px solid rgba(255,255,255,.08);font-size:32px;
transition:all .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.btn:active{transform:scale(.84)}
.btn.on{background:rgba(48,209,88,.08);border-color:rgba(48,209,88,.2);box-shadow:0 0 25px rgba(48,209,88,.08)}
.btn.on::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(48,209,88,.12);animation:breathe 2s ease infinite}
.btn.busy{background:rgba(255,159,10,.06);border-color:rgba(255,159,10,.12);pointer-events:none}
.btn.busy::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;border-top-color:var(--orange);animation:spin .8s linear infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
.lbl{font-size:14px;font-weight:500;color:var(--t2);transition:.3s;text-align:center}
.lbl.on{color:var(--green)}
.lbl.busy{color:var(--orange)}
.sub{font-size:12px;color:var(--t3);min-height:18px;text-align:center;font-family:'SF Mono',monospace}
.cntr{width:100%;margin-bottom:12px}
.cntr label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin:0 0 6px 4px;display:block}
.cs{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px;scrollbar-width:none}
.cs::-webkit-scrollbar{display:none}
.pill{-webkit-appearance:none;border:none;outline:none;flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:12px;font-family:inherit;font-weight:500;
background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:var(--t2);cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.pill:active{transform:scale(.88)}
.pill.sel{background:rgba(10,132,255,.08);border-color:rgba(10,132,255,.15);color:var(--accent)}
.qc{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--rad);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:8px}
.ring{width:30px;height:30px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .bg{fill:none;stroke:rgba(255,255,255,.04);stroke-width:3}
.ring .fg{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s}
.qr{flex:1}
.qg{font-size:15px;font-weight:700;letter-spacing:-.2px}
.ql{font-size:10px;color:var(--t2);margin-top:1px}
.st{width:100%;padding:10px 14px;border-radius:var(--rad);margin-bottom:6px;font-size:12px;line-height:1.5}
.st.on{background:rgba(48,209,88,.05);border:1px solid rgba(48,209,88,.08)}
.st.off{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03)}
.st .ip{font-family:'SF Mono',monospace;font-size:12px;color:var(--accent);margin:1px 0}
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:4px;padding:4px 20px 26px;z-index:10;
background:linear-gradient(to top,rgba(0,0,0,.85) 60%,transparent)}
.tab{-webkit-appearance:none;border:none;outline:none;font-family:inherit;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:500;
background:rgba(255,255,255,.04);color:var(--t3);cursor:pointer;transition:.3s;display:flex;align-items:center;gap:4px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tab .ico{font-size:16px}
.tab:active{transform:scale(.92)}
.tab.act{color:var(--accent);background:rgba(10,132,255,.1)}
.ts{position:fixed;top:0;left:0;right:0;z-index:99;pointer-events:none;padding:50px 20px 0;text-align:center}
.tt{display:inline-block;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:500;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);opacity:0;transform:translateY(-8px) scale(.95);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.tt.sh{opacity:1;transform:translateY(0) scale(1)}
.tt.ok{background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.12);color:var(--green)}
.tt.er{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.12);color:var(--red)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px}
.subs h2{font-size:24px;font-weight:700;margin-bottom:2px}
.subs>p{font-size:13px;color:var(--t2);margin-bottom:16px}
.sc{border-radius:var(--rad);padding:14px;margin-bottom:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.sc.hl{background:rgba(10,132,255,.04);border-color:rgba(10,132,255,.08)}
.sp{font-size:24px;font-weight:700}
.sp sp{font-size:12px;font-weight:400;color:var(--t2)}
.sd{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5}
.sb{-webkit-appearance:none;border:none;font-family:inherit;width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;margin-top:10px}
.sb:active{transform:scale(.97)}
.sb.pr{background:var(--accent);color:#fff}
.sb.se{background:rgba(255,159,10,.06);color:var(--orange);border:1px solid rgba(255,159,10,.08)}
</style>
</head>
<body>
<div class="ts"><div class="tt" id="tt"></div></div>
<div class="safe">
<div class="top"><h1>DanyanVPN</h1><div class="badge" id="bdg">Готов</div></div>
<div class="scroll" id="sc"><div id="pg"></div></div>
<div class="tabbar" id="tb">
<button class="tab act" data-t="main"><span class="ico">🛡</span>VPN</button>
<button class="tab" data-t="subs"><span class="ico">💎</span>Тарифы</button>
<button class="tab" data-t="aff"><span class="ico">👥</span>Партнёры</button>
</div>
</div>

<script>
const P=new URLSearchParams(window.location.search);
const API=P.get('api')||window.location.origin;
const KS=['auto','us','jp','de','nl','sg','gb','au','br'];
const NS=['🌍 Auto','🇺🇸 USA','🇯🇵 Japan','🇩🇪 Germany','🇳🇱 NL','🇸🇬 SG','🇬🇧 UK','🇦🇺 AU','🇧🇷 BR'];
let sel='auto',on=false,userId=0,busy=false;

const _f=(p,o)=>{const h=o?.headers||{};h['bypass-tunnel-reminder']='1';return fetch(API+p,{...o,headers:h})};
const _t=(m,t)=>{const e=document.getElementById('tt');e.textContent=m;e.className='tt '+t+' sh';clearTimeout(e._h);e._h=setTimeout(()=>e.className='tt',2200)};

function setBtn(a,loading){
  on=a;const b=document.getElementById('btn');if(!b)return;
  b.className='btn'+(a?' on':'')+(loading?' busy':'');
  b.textContent=loading?'':a?'🔒':'⚡';
  const l=document.getElementById('lbl');
  if(l){l.textContent=a?'Защищено':loading?'Подключаюсь...':'Нажми чтобы включить';l.className='lbl'+(a?' on':'')+(loading?' busy':'')}
  const d=document.getElementById('bdg');
  if(d){d.textContent=a?'Защищено':loading?'...':'Готов';d.className='badge'+(a?' on':'')+(loading?' busy':'')}
}

async function toggleVpn(){
  if(busy)return;
  if(on){
    setBtn(false,true);
    try{await _f('/api/vpn/off',{method:'POST',timeout:8})}catch(e){}
    setBtn(false,false);_t('VPN отключён','ok');upd();return
  }
  busy=true;setBtn(false,true);
  try{
    await _f('/api/vpn/on',{method:'POST',timeout:8});
    setBtn(true,false);_t('VPN включён ✅','ok')
  }catch(e){setBtn(false,false);_t('Ошибка','er')}
  busy=false;upd()
}

async function upd(){
  try{
    const s=await _f('/api/vpn/status',{timeout:5});const sd=await s.json();
    const i=await _f('/api/myip',{timeout:5});const id=await i.json();
    const ip=id.success?id.ip:'—';const c=sd.connected;
    setBtn(c,false);const st=document.getElementById('st');
    if(st){
      st.className='st'+(c?' on':' off');
      st.innerHTML=c?`🛡 <b>Защищено</b><div class="ip">${ip}</div><span style="color:var(--green);font-size:11px">DanyanVPN · США</span>`
        :`⛔ <b>Не защищено</b><div class="ip">${ip}</div>`
    }
    const sb=document.getElementById('psub');if(sb)sb.textContent=c?'IP: '+ip:'Нажми для включения'
  }catch(e){setBtn(false,false)}
}

function renderRegions(){
  const e=document.getElementById('cs');if(!e)return;e.innerHTML='';
  KS.forEach((k,i)=>{
    const b=document.createElement('button');b.className='pill'+(k===sel?' sel':'');b.textContent=NS[i];b.onclick=()=>{sel=k;renderRegions()};e.appendChild(b)
  })
}

function updateQuota(gb,hs){
  const p=Math.min(100,Math.round(gb/1*100));
  const a=document.getElementById('qa');if(!a)return;
  const d=94.25-(94.25*p/100);
  a.setAttribute('stroke-dashoffset',d);a.setAttribute('stroke',hs?'#30d158':p>20?'#0a84ff':'#ff9f0a');
  document.getElementById('qg').textContent=hs?'∞':gb.toFixed(2)+' GB';
  document.getElementById('ql').textContent=hs?'Премиум · безлимит':'Бесплатно · осталось'
}

async function loadQuota(){
  try{userId=(Telegram?.WebApp?.initDataUnsafe?.user?.id)||parseInt(P.get('tg'))||0}catch(e){}
  if(!userId){updateQuota(1,false);return}
  try{
    const r=await _f('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:userId})});
    const d=await r.json();if(d.remaining_gb!==undefined)updateQuota(d.remaining_gb,d.has_subscription)
  }catch(e){}
}

function switchTab(n){
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('act',e.dataset.t===n));
  const p=document.getElementById('pg');
  if(n==='main'){
    p.innerHTML=`<div class="mid"><button class="btn" id="btn" onclick="toggleVpn()">⚡</button><div class="lbl" id="lbl">Нажми чтобы включить</div><div class="sub" id="psub">VPN на сервере</div></div>
<div class="cntr"><label>Страна выхода</label><div class="cs" id="cs"></div></div>
<div class="qc"><div class="ring"><svg width="30" height="30"><circle class="bg" cx="15" cy="15" r="13"/><circle class="fg" id="qa" cx="15" cy="15" r="13" stroke-dasharray="81.68" stroke-dashoffset="0"/></svg></div><div class="qr"><div class="qg" id="qg">0 GB</div><div class="ql" id="ql">...</div></div></div>
<div class="st off" id="st">⏳ Проверка...</div>`;
    setTimeout(()=>{renderRegions();loadQuota();upd()},50)
  }else if(n==='subs'){
    p.innerHTML=`<div class="subs" style="padding-top:2px"><h2>💎 Тарифы</h2><p>Выбери план</p>
<div class="sc"><div class="sp">1 GB</div><div class="sd">🌍 Все страны · Max скорость · Бесплатно</div></div>
<div class="sc hl"><div class="sp">$4.99 <sp>/мес</sp></div><div class="sd">🚀 Безлимитный трафик · Приоритет · Все страны</div><button class="sb pr" onclick="(async()=>{if(!userId)return _t('Открой через бота','er');const r=await _f('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:userId,action:'subscribe'})});if((await r.json()).success)_t('Подписка оформлена!','ok')})()">💳 Купить $4.99</button></div>
<div class="sc"><div class="sp" style="color:var(--orange)">$0.99</div><div class="sd">📦 +1 GB трафика · Без срока</div><button class="sb se" onclick="(async(){if(!userId)return _t('Открой через бота','er');const r=await _f('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:userId,action:'buy_gb'})});const d=await r.json();if(d.success){_t('+1 GB!','ok');switchTab('main')}})()">📦 Купить $0.99</button></div></div>`
  }else{
    (async()=>{
      let ref='0',bal='0',aff='—';
      if(userId){try{const r=await _f('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:userId})});const d=await r.json();aff=d.affiliate_code||'—';bal=d.balance!==undefined?d.balance.toFixed(2):'0';ref=d.referrals||0}catch(e){}}
      p.innerHTML=`<div class="subs" style="padding-top:2px"><h2>👥 Партнёры</h2><p>Приглашай друзей — получай 30%</p>
<div class="sc" style="text-align:center;padding:20px"><div style="font-size:36px;margin-bottom:10px">🏆</div>
<div style="font-size:13px;color:var(--t2);line-height:1.7">
<b style="color:var(--text);font-size:16px">30%</b> от каждой покупки друга
</div>
<div style="margin-top:12px;display:flex;gap:12px;justify-content:center">
<div style="flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,.02)"><div style="font-size:11px;color:var(--t3)">Приглашено</div><div style="font-size:18px;font-weight:700">${ref}</div></div>
<div style="flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,.02)"><div style="font-size:11px;color:var(--t3)">Баланс</div><div style="font-size:18px;font-weight:700">$${bal}</div></div>
</div>
<div style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(255,255,255,.02);font-size:11px;color:var(--t3);word-break:break-all">🔗 https://t.me/danyanvpn_bot?start=${aff}</div>
</div></div>`
    })()
  }
  document.getElementById('sc').scrollTop=0
}

switchTab('main');
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.t)));
</script>
</body>
</html>
