<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DanyanVPN</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;display:flex;flex-direction:column;align-items:center}
.container{max-width:420px;width:100%}
.header{text-align:center;padding:24px 0 16px}
.logo{font-size:36px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;justify-content:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.subtitle{font-size:13px;color:var(--text2);margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:12px;font-weight:600}
.btn-power{width:100%;padding:20px;border:2px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);font-size:17px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.2s}
.btn-power:hover{border-color:var(--accent)}
.btn-power.active{border-color:var(--green);background:rgba(63,185,80,.08);color:var(--green)}
.btn-power.loading{opacity:.6;pointer-events:none}
.btn-power .spinner{display:none;width:18px;height:18px;border:2px solid var(--text2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.btn-power.loading .spinner{display:inline-block}
.btn-power.loading .icon-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.regions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.region-item{padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;transition:.15s;background:transparent}
.region-item:hover{border-color:var(--text2)}
.region-item.selected{border-color:var(--accent);color:var(--text);background:rgba(88,166,255,.06)}
.status-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.off{background:var(--red)}
.dot.on{background:var(--green);box-shadow:0 0 8px rgba(63,185,80,.4)}
.dot.wait{background:#d29922;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.config-box{display:none;margin-top:0}
.config-box.show{display:block}
.config-text{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;font-size:10px;line-height:1.5;color:var(--text2);max-height:160px;overflow-y:auto;word-break:break-all;white-space:pre-wrap;margin-top:8px}
.btn-group{display:flex;gap:8px;margin-top:10px}
.btn-group button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-copy{background:rgba(88,166,255,.12);color:var(--accent)}
.btn-copy:hover{background:rgba(88,166,255,.2)}
.btn-download{background:linear-gradient(135deg,#58a6ff,#a371f7);color:#fff}
.btn-download:hover{opacity:.9}
.error{display:none;padding:10px 14px;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.2);border-radius:8px;font-size:13px;color:var(--red);margin-bottom:12px;text-align:center}
.error.show{display:block}
.success{display:none;padding:10px 14px;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.2);border-radius:8px;font-size:13px;color:var(--green);margin-bottom:12px;text-align:center}
.success.show{display:block}
.footer{text-align:center;font-size:11px;color:var(--text2);padding:16px 0 32px;opacity:.5}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo"><span class="logo-icon">&#x1F6E1;</span>DanyanVPN</div>
<div class="subtitle">Free &bull; Unlimited &bull; WireGuard</div>
</div>

<div class="error" id="error"></div>
<div class="success" id="success"></div>

<div class="card">
<div class="card-title">&#x1F50C; Управление</div>
<button class="btn-power" id="powerBtn" onclick="toggle()">
<span class="icon-text">&#x26A1; Подключиться</span>
<span class="spinner"></span>
</button>
</div>

<div class="card">
<div class="card-title">&#x1F310; Регион</div>
<div class="regions" id="regionList"></div>
</div>

<div class="card">
<div class="status-row"><span class="dot off" id="statusDot"></span><span id="statusText">Отключено</span></div>
</div>

<div class="card config-box" id="configBox">
<div class="card-title">&#x1F511; Конфиг</div>
<div class="config-text" id="configText"></div>
<div class="btn-group">
<button class="btn-copy" onclick="copyCfg()">&#x1F4CB; Копировать</button>
<button class="btn-download" onclick="dlCfg()">&#x1F4E5; Скачать</button>
</div>
</div>

<div class="footer">DanyanVPN v1 &bull; Cloudflare Warp</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const API=params.get('api')||window.location.origin;

const REGIONS={
auto:{n:'Auto',f:'&#x1F30D;'},eu:{n:'Europe',f:'&#x1F1EA;&#x1F1FA;'},
asia:{n:'Asia',f:'&#x1F1EF;&#x1F1F5;'},us:{n:'USA',f:'&#x1F1FA;&#x1F1F8;'}
};
let sel='auto',cfg='',on=false;

function apifetch(path,opts){
const h=opts?.headers||{};
h['bypass-tunnel-reminder']='1';
return fetch(API+path,{...opts,headers:h});
}

function render(){
const el=document.getElementById('regionList');
el.innerHTML='';
for(const[k,v]of Object.entries(REGIONS)){
const d=document.createElement('div');
d.className='region-item'+(k===sel?' selected':'');
d.innerHTML=v.f+' '+v.n;
d.onclick=()=>{if(!on)select(k)};
el.appendChild(d);
}}

function select(k){
sel=k;
document.querySelectorAll('.region-item').forEach((e,i)=>{
e.className='region-item'+(Object.keys(REGIONS)[i]===k?' selected':'');
});
hideError();
}

function setStatus(state,text){
document.getElementById('statusDot').className='dot '+state;
document.getElementById('statusText').textContent=text;
}

function showError(m){
document.getElementById('error').innerHTML='&#x274C; '+m;
document.getElementById('error').classList.add('show');
}
function hideError(){document.getElementById('error').classList.remove('show');}
function showSuccess(){
document.getElementById('success').classList.add('show');
setTimeout(()=>document.getElementById('success').classList.remove('show'),3000);
}

async function toggle(){
const btn=document.getElementById('powerBtn');
if(on){on=false;btn.classList.remove('active');btn.querySelector('.icon-text').innerHTML='&#x26A1; Подключиться';setStatus('off','Отключено');return}
btn.classList.add('loading');btn.querySelector('.icon-text').textContent='';setStatus('wait','Генерирую...');hideError();
try{
const r=await apifetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({region:sel})});
const d=await r.json();
if(!d.success)throw new Error(d.error||'Ошибка');
cfg=d.config;on=true;
btn.classList.remove('loading');btn.classList.add('active');
btn.querySelector('.icon-text').innerHTML='&#x1F510; Подключено';
setStatus('on','Подключено &bull; '+REGIONS[sel].f+' '+REGIONS[sel].n);
document.getElementById('configText').textContent=cfg;
document.getElementById('configBox').classList.add('show');
showSuccess();
}catch(e){
btn.classList.remove('loading');btn.querySelector('.icon-text').innerHTML='&#x26A1; Подключиться';
setStatus('off','Ошибка');showError(e.message||'Не удалось получить конфиг');
}}

function copyCfg(){
if(!cfg)return;
navigator.clipboard.writeText(cfg).then(()=>{
const b=document.querySelector('.btn-copy');b.textContent='&#x2705; Скопировано';
setTimeout(()=>b.innerHTML='&#x1F4CB; Копировать',2000);
}).catch(()=>{const t=document.createElement('textarea');t.value=cfg;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()});
}

function dlCfg(){
if(!cfg)return;
const b=new Blob([cfg],{type:'text/plain'}),u=URL.createObjectURL(b);
const a=document.createElement('a');a.href=u;a.download='DanyanVPN_'+sel+'.conf';a.click();
URL.revokeObjectURL(u);
}

render();
</script>
</body>
</html>
