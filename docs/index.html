<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DanyanVPN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@keyframes bgmove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.06)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{box-shadow:0 0 24px rgba(88,166,255,.25)}50%{box-shadow:0 0 48px rgba(88,166,255,.4)}}

:root{--bg:#0a0e17;--card:rgba(22,27,34,.5);--border:rgba(48,54,61,.3);--text:#e6edf3;--dim:rgba(139,148,158,.7);--accent:#58a6ff;--green:#3fb950;--radius:20px}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;
overflow:hidden;
}
body::before{
content:'';position:fixed;inset:0;
background:linear-gradient(135deg,#0b111f,#0d1b2a 25%,#130b24 50%,#0d1b2a 75%,#0b111f);
background-size:400% 400%;animation:bgmove 12s ease infinite;z-index:-2;
}
body::after{
content:'';position:fixed;inset:0;
background:radial-gradient(ellipse at 50% 40%,rgba(88,166,255,.05) 0%,transparent 60%);
z-index:-1;
}

.app{
width:100%;max-width:400px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:0;
animation:fadeIn .6s ease;
}

.logo{font-size:26px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.logo i{width:30px;height:30px;background:linear-gradient(135deg,#58a6ff,#a371f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-style:normal;animation:breathe 3s ease-in-out infinite}
.sub{font-size:11px;color:var(--dim);margin-bottom:28px;letter-spacing:.4px}

/* Big center toggle */
.power-wrap{position:relative;margin-bottom:32px}
.power-ring{
width:120px;height:120px;border-radius:50%;
background:var(--card);backdrop-filter:blur(16px);
border:2px solid var(--border);cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:all .4s cubic-bezier(.34,1.56,.64,1);user-select:none;
position:relative;
}
.power-ring:active{transform:scale(.92)}
.power-ring.on{
border-color:var(--green);background:rgba(63,185,80,.08);
box-shadow:0 0 32px rgba(63,185,80,.2);
}
.power-ring.loading{
border-color:var(--accent);background:rgba(88,166,255,.08);
pointer-events:none;
}
.power-icon{font-size:44px;transition:.4s;line-height:1}
.power-ring.loading .power-icon{display:none}
.power-ring.loading::after{
content:'';width:28px;height:28px;border:3px solid var(--border);
border-top:3px solid var(--accent);border-radius:50%;
animation:spin .8s linear infinite;position:absolute;
}
.power-label{font-size:13px;color:var(--dim);margin-top:12px;text-align:center;font-weight:500;transition:.3s}
.power-label.on{color:var(--green)}
.power-label.wait{color:var(--accent)}

/* Status dot + IP */
.status{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:12px;color:var(--dim);min-height:20px}
.status .dot{width:7px;height:7px;border-radius:50%;transition:.3s}
.dot.off{background:var(--dim)}
.dot.on{background:var(--green);box-shadow:0 0 10px rgba(63,185,80,.5)}
.dot.wait{background:#d29922;animation:pulse 1s ease-in-out infinite}

/* Country selector */
.selector-wrap{width:100%;position:relative}
.selector-btn{
width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);
background:var(--card);backdrop-filter:blur(16px);
color:var(--dim);font-size:14px;cursor:pointer;text-align:left;
display:flex;align-items:center;gap:10px;transition:.2s;user-select:none;
}
.selector-btn:hover{border-color:var(--accent)}
.selector-btn .arrow{margin-left:auto;font-size:10px;opacity:.5;transition:.3s}
.selector-btn.open .arrow{transform:rotate(180deg)}
.selector-btn .flag{font-size:20px}

.selector-dropdown{
display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
background:rgba(22,27,34,.95);backdrop-filter:blur(20px);
border:1px solid var(--border);border-radius:var(--radius);
overflow:hidden;z-index:10;animation:fadeIn .2s ease;
}
.selector-dropdown.show{display:block}
.country-opt{
padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;
font-size:13px;color:var(--dim);transition:.15s;border-bottom:1px solid rgba(48,54,61,.15);
}
.country-opt:last-child{border-bottom:none}
.country-opt:hover{background:rgba(88,166,255,.06);color:var(--text)}
.country-opt.selected{color:var(--accent);background:rgba(88,166,255,.1)}
.country-opt .f{font-size:18px}
.country-opt .check{margin-left:auto;opacity:0;transition:.2s}
.country-opt.selected .check{opacity:1}

/* Deep link button */
.activate-btn{
display:none;width:100%;margin-top:12px;padding:15px;border:none;border-radius:var(--radius);
background:linear-gradient(135deg,#58a6ff,#a371f7);color:#fff;font-size:15px;font-weight:600;
cursor:pointer;transition:.2s;box-shadow:0 4px 20px rgba(88,166,255,.25);
align-items:center;justify-content:center;gap:8px;
}
.activate-btn.show{display:flex}
.activate-btn:active{transform:scale(.97)}

/* Config box (hidden, for fallback) */
.config-fallback{display:none;width:100%;margin-top:10px;padding:10px 14px;background:rgba(0,0,0,.3);border-radius:12px;font-family:monospace;font-size:9px;color:var(--dim);max-height:80px;overflow-y:auto;word-break:break-all;white-space:pre-wrap}
.config-fallback.show{display:block}

.footer{font-size:9px;color:var(--dim);margin-top:24px;opacity:.4;letter-spacing:.5px}
</style>
</head>
<body>

<div class="app">
<div class="logo"><i>🛡</i> DanyanVPN</div>
<div class="sub">Free · WireGuard · Cloudflare Warp</div>

<div class="power-wrap">
<div class="power-ring" id="powerRing" onclick="toggle()">
<span class="power-icon" id="powerIcon">⚡</span>
</div>
<div class="power-label" id="powerLabel">Нажми, чтобы включить</div>
</div>

<div class="status" id="statusRow">
<span class="dot off" id="statusDot"></span>
<span id="statusText">Готов к подключению</span>
</div>

<div class="selector-wrap">
<div class="selector-btn" id="selBtn" onclick="toggleDropdown()">
<span class="flag" id="selFlag">🌍</span>
<span id="selName">Выбрать страну</span>
<span class="arrow">▼</span>
</div>
<div class="selector-dropdown" id="selDropdown"></div>
<button class="activate-btn" id="activateBtn" onclick="activateVpn()">🚀 Открыть в WireGuard</button>
</div>

<div class="config-fallback" id="configFallback"></div>

<div class="footer">DanyanVPN · Cloudflare Warp · v3</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const API=params.get('api')||window.location.origin;

const COUNTRIES={
auto:{n:'Auto',f:'🌍'},
us:{n:'USA',f:'🇺🇸'},
jp:{n:'Japan',f:'🇯🇵'},
de:{n:'Germany',f:'🇩🇪'},
nl:{n:'Netherlands',f:'🇳🇱'},
sg:{n:'Singapore',f:'🇸🇬'},
gb:{n:'UK',f:'🇬🇧'},
au:{n:'Australia',f:'🇦🇺'},
br:{n:'Brazil',f:'🇧🇷'},
};

let sel='auto',cfg='',on=false;

function apifetch(path,opts){
const h=opts?.headers||{};
h['bypass-tunnel-reminder']='1';
return fetch(API+path,{...opts,headers:h});
}

function renderDropdown(){
const el=document.getElementById('selDropdown');
el.innerHTML='';
for(const[k,v]of Object.entries(COUNTRIES)){
const d=document.createElement('div');
d.className='country-opt'+(k===sel?' selected':'');
d.innerHTML='<span class="f">'+v.f+'</span><span>'+v.n+'</span><span class="check">✓</span>';
d.onclick=()=>{sel=k;renderDropdown();document.getElementById('selBtn').classList.remove('open');document.getElementById('selDropdown').classList.remove('show');updateSelector();};
el.appendChild(d);
}}

function updateSelector(){
const c=COUNTRIES[sel];
document.getElementById('selFlag').textContent=c.f;
document.getElementById('selName').textContent=c.n;
}

function toggleDropdown(){
const b=document.getElementById('selBtn');
const d=document.getElementById('selDropdown');
b.classList.toggle('open');d.classList.toggle('show');
}

function setState(state,text){
document.getElementById('statusDot').className='dot '+state;
document.getElementById('statusText').textContent=text;
const pl=document.getElementById('powerLabel');
pl.className='power-label'+(state==='on'?' on':state==='wait'?' wait':'');
pl.textContent=state==='on'?'Подключено':state==='wait'?'Подключаюсь...':'Нажми, чтобы включить';
document.getElementById('powerRing').className='power-ring'+(state==='on'?' on':state==='wait'?' loading':'');
if(state==='on')document.getElementById('powerIcon').textContent='🔒';
else if(state==='off')document.getElementById('powerIcon').textContent='⚡';
}

async function toggle(){
if(on){setState('off','Готов к подключению');on=false;cfg='';document.getElementById('activateBtn').classList.remove('show');document.getElementById('configFallback').classList.remove('show');return}
setState('wait','Генерирую...');
try{
const r=await apifetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({region:sel})});
const d=await r.json();
if(!d.success)throw new Error(d.error||'Ошибка');
cfg=d.config;on=true;
setState('on','Подключён · '+COUNTRIES[sel].f+' '+COUNTRIES[sel].n);
showActivate(cfg);
}catch(e){
setState('off','Ошибка: '+(e.message||'попробуй ещё раз'));
}}

function showActivate(config){
const b64=btoa(config);
const url=API+'/wg?config='+encodeURIComponent(b64);
const btn=document.getElementById('activateBtn');
btn.dataset.url=url;
btn.classList.add('show');
document.getElementById('configFallback').textContent=config;
document.getElementById('configFallback').classList.add('show');
}

function activateVpn(){
const url=document.getElementById('activateBtn').dataset.url;
window.location.href=url;
setTimeout(()=>{
navigator.clipboard.writeText(cfg).catch(()=>{});
},1000);
}

renderDropdown();
updateSelector();
</script>
</body>
</html>
